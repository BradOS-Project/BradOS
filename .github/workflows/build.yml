name: BradOS Build Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  OS_NAME: BradOS
  KERNEL_VERSION: 6.8.9
  INSTALLER_REPO: https://github.com/BradOS-Project/Installer.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Deps
        run: sudo apt update && sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev git wget xorriso squashfs-tools mtools dosfstools rsync python3

      - name: Generate Version
        run: echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Cache Buildroot
        uses: actions/cache@v4
        with:
          path: |
            buildroot/dl
            buildroot/output
          key: brados-v8-${{ github.ref_name }}

      - name: Fetch Sources
        run: |
          [ -d buildroot ] || git clone --depth 1 https://github.com/buildroot/buildroot.git
          [ -d limine ] || git clone --branch v7.x-binary --depth 1 https://github.com/limine-bootloader/limine.git
          git clone ${{ env.INSTALLER_REPO }} installer-src
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.KERNEL_VERSION }}.tar.xz
          tar -xf linux-${{ env.KERNEL_VERSION }}.tar.xz

      - name: Build Kernel
        run: |
          cd linux-${{ env.KERNEL_VERSION }}
          make x86_64_defconfig
          make -j$(nproc) bzImage
          cp arch/x86/boot/bzImage ../bzImage

      - name: Build OS (Buildroot)
        run: |
          cd buildroot
          [ -f .config ] || make qemu_x86_64_defconfig
          {
            echo "BR2_PACKAGE_PYTHON3=y"
            echo "BR2_PACKAGE_PYTHON3_TKINTER=y"
            echo "BR2_PACKAGE_XORG7=y"
            echo "BR2_PACKAGE_XSERVER_XORG_SERVER=y"
            echo "BR2_PACKAGE_FLUXBOX=y"
            echo "BR2_PACKAGE_PCMANFM=y"
            echo "BR2_PACKAGE_MIDORI=y" 
            echo "BR2_PACKAGE_RSYNC=y"
            echo "BR2_PACKAGE_PARTED=y"
            echo "BR2_PACKAGE_E2FSPROGS=y"
            echo "BR2_PACKAGE_UTIL_LINUX=y"
            echo "BR2_PACKAGE_UTIL_LINUX_WIPEFS=y"
          } >> .config
          make olddefconfig
          make -j$(nproc)

      - name: Assemble Distro
        run: |
          ROOT=buildroot/output/target
          mkdir -p $ROOT/usr/bin $ROOT/root/Desktop $ROOT/usr/share/limine
          
          # 1. Setup Installer & Bootloader
          cp installer-src/gui_installer.py $ROOT/usr/bin/
          chmod +x $ROOT/usr/bin/gui_installer.py
          cp limine/limine-bios.sys $ROOT/usr/share/limine/
          cp limine/limine $ROOT/usr/bin/
          
          # 2. Create Live ISO Desktop Icon
          cat <<EOF > $ROOT/root/Desktop/Install.desktop
          [Desktop Entry]
          Name=Install BradOS
          Exec=python3 /usr/bin/gui_installer.py
          Type=Application
          Icon=system-software-install
          Terminal=false
          EOF
          chmod +x $ROOT/root/Desktop/Install.desktop

          # 3. Configure LIVE Startup
          # Note: The installer cleans this file up during the HDD install
          echo "fluxbox &" > $ROOT/root/.xinitrc
          echo "pcmanfm --desktop &" >> $ROOT/root/.xinitrc
          echo "python3 /usr/bin/gui_installer.py" >> $ROOT/root/.xinitrc
          
          # Auto-start X on login
          grep -q "startx" $ROOT/etc/profile || echo "startx" >> $ROOT/etc/profile

      - name: Generate ISO
        run: |
          mksquashfs buildroot/output/target rootfs.squashfs -comp xz -noappend
          mkdir -p iso/boot
          cp rootfs.squashfs iso/
          cp bzImage iso/boot/
          cp limine/limine-bios.sys limine/limine-bios-cd.bin iso/boot/
          cat <<EOF > iso/boot/limine.conf
          TIMEOUT=3
          GRAPHICS=yes
          :BradOS (Live)
              PROTOCOL=linux
              KERNEL_PATH=/boot/bzImage
              MODULE_PATH=/rootfs.squashfs
              CMDLINE=root=/dev/ram0 rw
          EOF
          xorriso -as mkisofs -o BradOS-${{ env.VERSION }}.iso -b boot/limine-bios-cd.bin -no-emul-boot -boot-load-size 4 -boot-info-table iso/

      - name: Upload & Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: BradOS-${{ env.VERSION }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}