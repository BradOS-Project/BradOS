name: BradOS Full Distro Build Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  OS_NAME: BradOS
  KERNEL_VERSION: 6.8.9
  INSTALLER_REPO: https://github.com/BradOS-Project/Installer.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
            git wget xorriso squashfs-tools mtools dosfstools rsync qemu-system-x86 python3

      - name: Generate version
        run: echo "VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Cache Buildroot
        uses: actions/cache@v4
        with:
          path: |
            buildroot/dl
            buildroot/output
          key: brados-v6-${{ github.ref_name }}
          restore-keys: brados-v6-

      - name: Clone Sources
        run: |
          [ -d buildroot ] || git clone --depth 1 https://github.com/buildroot/buildroot.git
          [ -d limine ] || git clone --branch v7.x-binary --depth 1 https://github.com/limine-bootloader/limine.git
          rm -rf installer-src && git clone ${{ env.INSTALLER_REPO }} installer-src
          if [ ! -d "linux-${{ env.KERNEL_VERSION }}" ]; then
            wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.KERNEL_VERSION }}.tar.xz
            tar -xf linux-${{ env.KERNEL_VERSION }}.tar.xz
          fi

      - name: Build Kernel
        run: |
          cd linux-${{ env.KERNEL_VERSION }}
          if [ ! -f arch/x86/boot/bzImage ]; then
            make x86_64_defconfig
            make -j$(nproc) bzImage
          fi
          cp arch/x86/boot/bzImage ../bzImage

      - name: Build Buildroot
        run: |
          cd buildroot
          [ -f .config ] || make qemu_x86_64_defconfig
          {
            echo "BR2_PACKAGE_PYTHON3=y"
            echo "BR2_PACKAGE_PYTHON3_TKINTER=y"
            echo "BR2_PACKAGE_XORG7=y"
            echo "BR2_PACKAGE_XSERVER_XORG_SERVER=y"
            echo "BR2_PACKAGE_FLUXBOX=y"
            echo "BR2_PACKAGE_PCMANFM=y"
            echo "BR2_PACKAGE_MIDORI=y" 
            echo "BR2_PACKAGE_RSYNC=y"
            echo "BR2_PACKAGE_PARTED=y"
            echo "BR2_PACKAGE_E2FSPROGS=y"
            echo "BR2_PACKAGE_UTIL_LINUX=y"
            echo "BR2_PACKAGE_UTIL_LINUX_WIPEFS=y"
          } >> .config
          make olddefconfig
          make -j$(nproc)

      - name: Assemble Filesystem
        run: |
          ROOT=buildroot/output/target
          mkdir -p $ROOT/usr/bin $ROOT/root/Desktop $ROOT/usr/share/limine
          cp installer-src/*.py $ROOT/usr/bin/
          chmod +x $ROOT/usr/bin/gui_installer.py
          cp limine/limine-bios.sys $ROOT/usr/share/limine/
          cp limine/limine $ROOT/usr/bin/
          
          cat <<EOF > $ROOT/root/Desktop/Installer.desktop
          [Desktop Entry]
          Type=Application
          Name=Install BradOS
          Exec=python3 /usr/bin/gui_installer.py
          Icon=system-software-install
          Terminal=false
          EOF
          chmod +x $ROOT/root/Desktop/Installer.desktop

          echo "fluxbox &" > $ROOT/root/.xinitrc
          echo "pcmanfm --desktop &" >> $ROOT/root/.xinitrc
          echo "midori &" >> $ROOT/root/.xinitrc
          echo "python3 /usr/bin/gui_installer.py" >> $ROOT/root/.xinitrc
          
          grep -q "startx" $ROOT/etc/profile || echo "startx" >> $ROOT/etc/profile
          echo "NAME=\"BradOS\"" > $ROOT/etc/os-release

      - name: Create ISO
        run: |
          mksquashfs buildroot/output/target rootfs.squashfs -comp xz -noappend
          mkdir -p iso/boot
          cp rootfs.squashfs iso/
          cp bzImage iso/boot/
          cp limine/limine-bios.sys limine/limine-bios-cd.bin iso/boot/
          cat <<EOF > iso/boot/limine.conf
          TIMEOUT=3
          GRAPHICS=yes
          :BradOS
              PROTOCOL=linux
              KERNEL_PATH=/boot/bzImage
              MODULE_PATH=/rootfs.squashfs
              CMDLINE=root=/dev/ram0 rw
          EOF
          xorriso -as mkisofs -o BradOS-${{ env.VERSION }}.iso \
            -b boot/limine-bios-cd.bin -no-emul-boot -boot-load-size 4 -boot-info-table iso/

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: BradOS-${{ env.VERSION }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}