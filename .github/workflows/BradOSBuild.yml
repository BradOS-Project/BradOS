name: BradOS Build Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  OS_NAME: BradOS
  KERNEL_VERSION: 6.8.9
  INSTALLER_REPO: https://github.com/BradOS-Project/Installer.git
  BUILDROOT_VERSION: 2025.02.13   # Use exact point release tag

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
            git wget xorriso squashfs-tools mtools dosfstools rsync python3 cpio \
            grub-common grub-pc-bin

      - id: generate_version
        name: Generate Version String
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          # expose as a step output so it can be used in action inputs
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Cache Buildroot Downloads
        uses: actions/cache@v4
        with:
          path: buildroot/dl
          key: brados-dl-${{ env.BUILDROOT_VERSION }}

      - name: Fetch Sources
        run: |
          set -e
          # Download Buildroot release tarball
          wget -q https://buildroot.org/downloads/buildroot-${{ env.BUILDROOT_VERSION }}.tar.xz
          tar -xf buildroot-${{ env.BUILDROOT_VERSION }}.tar.xz
          mv buildroot-${{ env.BUILDROOT_VERSION }} buildroot

          # Clone installer repository
          git clone ${{ env.INSTALLER_REPO }} installer-src

          # Download Linux kernel
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.KERNEL_VERSION }}.tar.xz
          tar -xf linux-${{ env.KERNEL_VERSION }}.tar.xz

      - name: Build Kernel
        run: |
          set -e
          cd linux-${{ env.KERNEL_VERSION }}
          if [ ! -f arch/x86/boot/bzImage ]; then
            make x86_64_defconfig
            scripts/config -e CONFIG_SQUASHFS -e CONFIG_SQUASHFS_XZ \
                           -e CONFIG_OVERLAY_FS -e CONFIG_DEVTMPFS
            make olddefconfig
            make -j$(nproc) bzImage
          fi
          cp arch/x86/boot/bzImage ../bzImage

      - name: Configure Buildroot
        run: |
          set -e
          cd buildroot
          make qemu_x86_64_defconfig
          mkdir -p configs
          printf '%s\n' \
          'BR2_PACKAGE_PYTHON3=y' \
          'BR2_PACKAGE_PYTHON3_TKINTER=y' \
          'BR2_PACKAGE_XORG7=y' \
          'BR2_PACKAGE_XSERVER_XORG_SERVER=y' \
          'BR2_PACKAGE_FLUXBOX=y' \
          'BR2_PACKAGE_PCMANFM=y' \
          'BR2_PACKAGE_MIDORI=y' \
          'BR2_PACKAGE_RSYNC=y' \
          'BR2_PACKAGE_PARTED=y' \
          'BR2_PACKAGE_E2FSPROGS=y' \
          'BR2_PACKAGE_UTIL_LINUX=y' \
          'BR2_PACKAGE_UTIL_LINUX_WIPEFS=y' \
          'BR2_TARGET_ROOTFS_INITRAMFS=y' \
          'BR2_PACKAGE_BUSYBOX_SHOW_OTHERS=y' \
          'BR2_PACKAGE_UTIL_LINUX_MOUNT=y' \
          'BR2_PACKAGE_E2FSPROGS_MKE2FS=y' \
          'BR2_TARGET_GRUB2=y' \
          'BR2_TARGET_GRUB2_I386_PC=y' \
          'BR2_TARGET_GRUB2_INSTALL_TOOLS=y' \
          > configs/brados_defconfig
          make BR2_DEFCONFIG=configs/brados_defconfig defconfig
          make defconfig  # This validates and regenerates the config cleanly

      - name: Build Buildroot RootFS and Initramfs
        run: |
          set -e
          cd buildroot
          make -j$(nproc)

      - name: Assemble Final System
        run: |
          set -e
          ROOT=buildroot/output/target
          INITRAMFS=buildroot/output/images/rootfs.cpio
          mkdir -p $ROOT/usr/bin $ROOT/root/Desktop $ROOT/boot

          # Copy Installer and Tools
          cp installer-src/gui_installer.py $ROOT/usr/bin/
          chmod +x $ROOT/usr/bin/gui_installer.py

          # Copy kernel into rootfs so it's available for installation
          cp bzImage $ROOT/boot/

          # Live ISO Desktop Icon
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Install BradOS' \
            'Exec=python3 /usr/bin/gui_installer.py' \
            'Type=Application' \
            'Icon=system-software-install' \
            'Terminal=false' \
            > $ROOT/root/Desktop/Install.desktop
          chmod +x $ROOT/root/Desktop/Install.desktop

          # Startup Configuration (Live)
          echo "fluxbox &" > $ROOT/root/.xinitrc
          echo "pcmanfm --desktop &" >> $ROOT/root/.xinitrc
          echo "python3 /usr/bin/gui_installer.py" >> $ROOT/root/.xinitrc
          grep -q "startx" $ROOT/etc/profile || echo "startx" >> $ROOT/etc/profile

          # Create SquashFS of the root filesystem
          mksquashfs $ROOT rootfs.squashfs -comp xz -noappend

          # Verify initramfs exists
          [ -f "$INITRAMFS" ] || { echo "Initramfs not found!"; exit 1; }

      - name: Create Bootable ISO
        run: |
          set -e
          mkdir -p iso/boot
          cp rootfs.squashfs iso/
          cp bzImage iso/boot/
          cp buildroot/output/images/rootfs.cpio iso/boot/initramfs.cpio
          mkdir -p iso/boot/grub

          printf '%s\n' \
            'set default=0' \
            'set timeout=3' \
            '' \
            'menuentry "BradOS (Live)" {' \
            '    linux /boot/bzImage root=/dev/ram0 rw rootfstype=squashfs rootflags=loop' \
            '    initrd /boot/initramfs.cpio /rootfs.squashfs' \
            '}' \
            > iso/boot/grub/grub.cfg

          ISO_NAME="BradOS-${{ steps.generate_version.outputs.version }}.iso"
          grub-mkrescue -o "$ISO_NAME" iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_version.outputs.version }}
          files: BradOS-${{ steps.generate_version.outputs.version }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
